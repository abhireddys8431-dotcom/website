      <stop offset="0%" stop-color="#D65E42" /> <!-- Terracotta -->
      <stop offset="100%" stop-color="#E8C860" /> <!-- Warm Gold -->
    </linearGradient>
  </defs>
  <!-- Deep Chocolate circle backdrop -->
